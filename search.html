\":\"随笔\",\"tags\":[\"生活\",\"开端\"],\"description\":\"这是博客的第一篇文章，以此作为开端。\",\"content\":\"\\n## 新的开始\\n\\n这是这个博客的第一篇文章。\\n\\n从今天开始，我会在这里记录一些思考与见闻。\\n\\n## 为什么写博客\\n\\n写作是一种思考的方式。把想法写下来，能让它们变得更清晰。\\n\\n### 记录思考\\n\\n很多时候，一个想法在脑海里转瞬即逝。写下来，就能反复审视。\\n\\n### 分享交流\\n\\n如果恰好有人读到，产生一些共鸣或讨论，那就更好了。\\n\\n---\\n\\n\u003e 路虽远，行则将至。\\n\\n就这样开始吧。\\n\"},{\"slug\":\"second-post\",\"title\":\"关于设计的一些思考\",\"date\":\"2026-05-22\",\"category\":\"设计\",\"tags\":[\"设计\",\"美学\",\"思考\"],\"description\":\"好的设计不仅仅是好看，更是一种沟通方式。\",\"content\":\"\\n## 设计与功能\\n\\n好的设计应该是隐形的。它不会喧宾夺主，而是让用户自然地完成任务。\\n\\n### 暗色模式\\n\\n暗色模式不只是把背景变黑。它需要精心设计层次和对比度。\\n\\n### 工业美学\\n\\n《明日方舟：终末地》的工业美学给人留下深刻印象。它的设计语言有几个特点：\\n\\n- **硬朗的几何线条** - 干净利落，不拖泥带水\\n- **高对比度强调色** - 在暗色背景上特别醒目\\n- **质感的处理** - 纹理和细节让界面更有层次\\n\\n```css\\n/* 模拟 Endfield 风格的斜线纹理 */\\n.element {\\n  background-image: repeating-linear-gradient(\\n    -45deg,\\n    transparent,\\n    transparent 2px,\\n    rgba(255, 255, 255, 0.03) 2px,\\n    rgba(255, 255, 255, 0.03) 4px\\n  );\\n}\\n```\\n\\n## 小结\\n\\n设计是一门平衡的艺术。找到功能与美学的平衡点，需要持续地学习和实践。\\n\"}]}],[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/f3888936cbadb3ad.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]]],null],null]},[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"search\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\"}]],null]},[[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/c45a31400bc7a938.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"zh-CN\",\"children\":[\"$\",\"body\",null,{\"children\":[[\"$\",\"$L8\",null,{}],[\"$\",\"main\",null,{\"style\":{\"minHeight\":\"calc(100vh - var(--header-height))\",\"paddingTop\":\"
