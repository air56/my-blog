hildren\":[\"search\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],\"initialSeedData\":[\"\",{\"children\":[\"search\",{\"children\":[\"__PAGE__\",{},[[\"$L4\",[\"$\",\"$L5\",null,{\"posts\":[{\"slug\":\"ai-assisted-blog\",\"title\":\"AI辅助搭建个人Blog\",\"date\":\"2026-05-23\",\"category\":\"技术\",\"tags\":[\"博客\",\"Next.js\",\"GitHub Pages\",\"踩坑\"],\"description\":\"从设计到部署，记录用AI辅助搭建个人博客遇到的几个坑。\",\"content\":\"\\n## 从零开始\\n\\n参考《明日方舟：终末地》官网的暗色工业风设计，用 **Next.js 14** 搭建了一个个人随笔博客，Markdown 写文章，静态生成后部署到 GitHub Pages。\\n\\n## 一路踩过的坑\\n\\n### 1. 仓库公开才能用 GitHub Pages\\n\\nGitHub Pages 免费版只支持**公开仓库**，私有仓库需要付费。把仓库改为公开后就能用了。\\n\\n### 2. GitHub Actions 分支策略\\n\\n第一次部署报错：\\n```\\nBranch \\\"master\\\" is not allowed to deploy to github-pages\\n```\\n需要在仓库 Settings → Pages 里正确选择 **GitHub Actions** 作为部署源，而不是默认的 \\\"Deploy from a branch\\\"。\\n\\n### 3. 部署后 UI 全崩\\n\\n推送到 GitHub 后网站样式全没了——白色背景加一堆超链接。原因是 GitHub Pages 项目站点的路径是 `/my-blog/`，但 Next.js 默认的资源路径是 `/_next/static/...`，浏览器自然找不到 CSS/JS。\\n\\n修复：在 `next.config.js` 加上 `basePath: '/my-blog'`。\\n\\n### 4. Chrome 能打开，Edge 不行（最诡异的坑）\\n\\nEdge 会把地址栏输入的 `https://air56.github.io/my-blog/` 自动替换成 `http://myblog.rin/`（502 错误）。但如果从**搜索栏**进入却正常。\\n\\n排查后发现：之前曾在 GitHub Pages 设置过自定义域名 `myblog.rin`，虽然删除了配置，但 **Edge 已经缓存了那条 301 永久重定向**，每次输入网址都在本地直接跳转，请求根本没发出去。\\n\\n搜索栏能打开，是因为搜索请求经过了搜索引擎中转，形成了新的导航上下文，绕过了本地 301 缓存。\\n\\nChrome 没事，是因为配置 `myblog.rin` 时 Chrome 根本没访问过那个网站，压根没缓存那条 301。\\n\\n修复：清除 Edge 缓存即可。\\n\\n---\\n\\n从代码配置到部署流程再到浏览器缓存机制，每个坑背后都有值得了解的知识点。记录下来，希望帮到有类似遭遇的人。\\n\"},{\"slug\":\"hello-world\",\"title\":\"你好，世界\",\"date\":\"2026-05-23\",\"category\":\"随笔\",\"tags\":[\"生活\",\"开端\"],\"description\":\"这是博客的第一篇文章，以此作为开端。\",\"content\":\"\\n## 新的开始\\n\\n这是这个博客的第一篇文章。\\n\\n从今天开始，我会在这里记录一些思考与见闻。\\n\\n## 为什么写博客\\n\\n写作是一种思考的方式。把想法写下来，能让它们变得更清晰。\\n\\n### 记录思考\\n\\n很多时候，一个想法在脑海里转瞬即逝。写下来，就能反复审视。\\n\\n### 分享交流\\n\\n如果恰好有人读到，产生一些共鸣或讨论，那就更好了。\\n\\n---\\n\\n\u003e 路虽远，行则将至。\\n\\n就这样开始吧。\\n\"},{\"slug\":\"second-post\",\"title\":\"关于设计的一些思考\",\"date\":\"2026-05-22\",\"category\":\"设计\",\"tags\":[\"设计\",\"美学\",\"思考\"],\"description\":\"好的设计不仅仅是好看，更是一种沟通方式。\",\"content\":\"\\n## 设计与功能\\n\\n好的设计应该是隐形的。它不会喧宾夺主，而是让用户自然地完成任务。\\n\\n### 暗色模式\\n\\n暗色模式不只是把背景变黑。它需要精心设计层次和对比度。\\n\\n### 工业美学\\n\\n《明日方舟：终末地》的工业美学给人留下深刻印象。它的设计语言有几个特点：\\n\\n- **硬朗的几何线条** - 干净利落，不拖泥带水\\n- **高对比度强调色** - 在暗色背景上特别醒目\\n- **质感的处理** - 纹理和细节让界面更有层次\\n\\n```css\\n/* 模拟 Endfield 风格的斜线纹理 */\\n.element {\\n  background-image: repeating-linear-gradient(\\n    -45deg,\\n    transparent,\\n    transparent 2px,\\n    rgba(255, 255, 255, 0.03) 2px,\\n    rgba(255, 255, 255, 0.03) 4px\\n  );\\n}\\n```\\n\\n## 小结\\n\\n设计是一门平衡的艺术。找到功能与美学的平衡点，需要持续地学习和实践。\\n\"}]}],[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/my-blog/_next/static/css/f3888936cbadb3ad.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]]],null],null]},[null,[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"search\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\"}]],null]},[[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/my-blog/_next/static/css/c4153905ccf68fb0.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"zh-CN\",\"children\":[\"$\",\"body\",null,{\"children\":[\"$\",\"$L8\",null,{\"children\":[[\"$\",\"$L9\",null,{}],[\"$\",\"main\",null,{\"style\":{\"minHeight\":\"calc(100vh - var(--header-height))\",\"paddingTop\":\"var(--header-height)\"},\"children\":[\"$\",\"$L6\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound
